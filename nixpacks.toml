[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.curl", "php84Extensions.pdo", "php84Extensions.tokenizer", "php84Extensions.fileinfo", "php84Extensions.openssl"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"